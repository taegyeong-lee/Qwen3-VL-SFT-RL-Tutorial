# DPO Config - Single GPU (bf16 LoRA)
model: "Qwen/Qwen3-VL-4B-Instruct"
dataset_path: "data/dpo_pairs.jsonl"
output_dir: "outputs/dpo_lora"
sft_adapter_path: "outputs/sft_lora/final"
sft_merged_path: "outputs/sft_merged"

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
quantize_4bit: false

# Training
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
lr: 5.0e-6
lr_scheduler: "cosine"
warmup_ratio: 0.1
optim: "adamw_torch"
bf16: true
max_grad_norm: 0.1

# DPO specific
beta: 0.1                  # KL penalty coefficient
max_length: 2048
max_prompt_length: 1024
loss_type: "sigmoid"       # sigmoid | hinge | ipo

# Checkpointing
save_steps: 100
logging_steps: 10
report_to: "tensorboard"
# max_samples: 100  # uncomment for testing

# Pair generation (for build_pairs.py)
pair_generation:
  num_samples_per_image: 8
  temperature: 1.0
  max_new_tokens: 512
