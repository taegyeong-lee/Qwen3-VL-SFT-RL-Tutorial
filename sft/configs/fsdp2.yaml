# ------------------------------
# accelerate_config.yaml (FSDP)
# ------------------------------
compute_environment: LOCAL_MACHINE
debug: false
distributed_type: FSDP
downcast_bf16: 'no'
enable_cpu_affinity: false   # CPU affinity 비활성화
fsdp_config:
  fsdp_activation_checkpointing: true  # ⚡ gradient_checkpointing 대신 FSDP에서 처리
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_cpu_ram_efficient_loading: true
  fsdp_offload_params: true   # GPU 메모리 절약
  fsdp_reshard_after_forward: true
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_version: 2

machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 2  # GPU 개수에 맞게 조정
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false