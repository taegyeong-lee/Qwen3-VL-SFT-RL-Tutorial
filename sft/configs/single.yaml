# SFT Config - Single GPU (bf16 LoRA)
model: "Qwen/Qwen3-VL-4B-Instruct"
dataset_path: "data/teacher/dataset.jsonl"
output_dir: "outputs/sft_lora"

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

# Training
epochs: 2
batch_size: 1
grad_accum: 16
lr: 1.0e-4
lr_scheduler: "cosine"
warmup_ratio: 0.05
optim: "adamw_torch"
bf16: true

# Data
train_ratio: 0.8
val_ratio: 0.1
# max_samples: 50  # uncomment for testing

# Checkpointing
save_steps: 200
save_total_limit: 2
eval_steps: 200
logging_steps: 10
report_to: "tensorboard"
dataloader_num_workers: 0
