# GRPO Config - Single GPU (bf16 LoRA, no vLLM)
model: "Qwen/Qwen3-VL-4B-Instruct"
dataset_path: "data/teacher/dataset.jsonl"
output_dir: "outputs/grpo_lora"
sft_adapter_path: "outputs/sft_lora/final"
sft_merged_path: "outputs/sft_merged"

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0
quantize_4bit: false

# Training
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
lr: 5.0e-6
lr_scheduler: "cosine"
warmup_ratio: 0.1
optim: "adamw_torch"
bf16: true
max_grad_norm: 0.1

# GRPO specific
num_generations: 4
max_completion_length: 1024
loss_type: "dr_grpo"
# generation_batch_size: 4
# temperature: 1.0

# vLLM
use_vllm: false

# Checkpointing
save_steps: 100
logging_steps: 1
report_to: "tensorboard"
gradient_checkpointing: false
# max_samples: 100  # uncomment for testing
