# GRPO Config - Multi GPU (vLLM server mode)
model: "Qwen/Qwen3-VL-4B-Instruct"
dataset_path: "data/teacher/dataset.jsonl"
output_dir: "outputs/grpo_lora"
sft_adapter_path: "outputs/sft_lora/final"
sft_merged_path: "outputs/sft_merged"

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0
quantize_4bit: false

# Training
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 2
lr: 5.0e-6
lr_scheduler: "cosine"
warmup_ratio: 0.1
optim: "adamw_8bit"
bf16: true
max_grad_norm: 0.1
adam_beta1: 0.9
adam_beta2: 0.99
weight_decay: 0.1

# GRPO specific
num_generations: 8
max_completion_length: 1024
loss_type: "dr_grpo"
temperature: 1.2
# generation_batch_size: 8

# vLLM
use_vllm: true
vllm_mode: "colocate"
vllm_gpu_memory_utilization: 0.4
vllm_enable_sleep_mode: true

# Checkpointing
save_steps: 100
logging_steps: 1
report_to: "tensorboard"
gradient_checkpointing: false
